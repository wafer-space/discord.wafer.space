# .github/workflows/export-and-publish.yml
name: Export and Publish Discord Logs

on:
  schedule:
    # Run hourly as specified in requirements
    - cron: '0 * * * *'

  workflow_dispatch:  # Allow manual trigger

  push:
    branches: [master]  # Run on master branch pushes

permissions:
  contents: write
  pages: write
  id-token: write

# Ensure only one export workflow runs at a time to prevent state.json merge conflicts.
# The workflow can take some time but runs hourly, so concurrent runs would conflict.
# With cancel-in-progress: false, queued runs will wait rather than be cancelled.
concurrency:
  group: discord-export
  cancel-in-progress: false

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 240  # Allow time for catch-up backfills (multiple months × channels)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for state.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: uv pip install --system -r requirements.txt

      - name: Cache DiscordChatExporter
        id: cache-dce
        uses: actions/cache@v4
        with:
          path: bin/discord-exporter
          key: dce-${{ runner.os }}-latest

      - name: Download DiscordChatExporter
        if: steps.cache-dce.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin/discord-exporter
          wget https://github.com/Tyrrrz/DiscordChatExporter/releases/latest/download/DiscordChatExporter.Cli.linux-x64.zip
          unzip DiscordChatExporter.Cli.linux-x64.zip -d bin/discord-exporter
          chmod +x bin/discord-exporter/DiscordChatExporter.Cli
          rm DiscordChatExporter.Cli.linux-x64.zip

      - name: Fetch existing gh-pages content
        # Pulls the previously-published site into public/ so the export step
        # can see which months are already complete (and skip them). On a
        # fresh repo gh-pages won't exist yet; that's fine — we start empty.
        run: |
          set -euo pipefail
          echo "Fetching existing gh-pages content into public/..."
          rm -rf public

          if git fetch origin gh-pages:gh-pages; then
            git worktree add public gh-pages
            # Remove .git reference so peaceiris/actions-gh-pages can work properly
            rm -f public/.git
            echo "✓ Fetched $(find public -type f | wc -l) files from gh-pages"
          else
            echo "No existing gh-pages branch yet — starting fresh"
            mkdir -p public
          fi

      - name: Run export script
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          PYTHONPATH: .
          # Give the export script a 210-minute budget — 30 minutes below the
          # job timeout so organize/navigate/deploy have time to run on the
          # partial result if a long backfill exhausts the budget.
          EXPORT_MAX_RUNTIME_SECONDS: "12600"
        run: |
          echo "Starting export..."
          uv run python scripts/export_channels.py
        id: export

      - name: Organize exports
        env:
          PYTHONPATH: .
        run: |
          echo "Organizing exports..."
          uv run python scripts/organize_exports.py
        id: organize

      - name: Run navigation generator
        env:
          PYTHONPATH: .
        run: |
          echo "Generating navigation..."
          uv run python scripts/generate_navigation.py
        id: navigation

      # GitHub rejects any file >100MB on push and Pages can't serve files
      # that big, so a single oversized Discord attachment (e.g. a 215MB GDS
      # dump) blocks the entire gh-pages deploy. Hold such files back from
      # public/ — recording a metadata sidecar and rewriting the chat link to
      # the file's servable LFS URL — so the deploy push always succeeds.
      - name: Hold back oversized media
        env:
          PYTHONPATH: .
        run: |
          echo "Checking for oversized media (>50MB)..."
          uv run python scripts/large_media.py
        id: large_media

      - name: Check for changes
        id: check_changes
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain public/ state.json)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit state.json to main
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          git config user.name "Discord Archive Bot"
          git config user.email "actions@github.com"
          # CI has no terminal, so set non-interactive editors. Without this,
          # `git rebase --continue` after an automatic conflict resolution tries
          # to launch $EDITOR for the merge commit message and fails with
          # "Terminal is dumb, but EDITOR unset".
          export GIT_EDITOR=true
          export GIT_SEQUENCE_EDITOR=true

          git add state.json
          # Only commit if state.json actually has changes staged
          if ! git diff --cached --quiet; then
            git commit -m "chore: update export state

          Updated by GitHub Actions on $(date -u +%Y-%m-%d\ %H:%M\ UTC)"

            # Pull with rebase to handle concurrent workflow updates.
            # If rebase fails due to state.json conflict, the merge script
            # resolves it deterministically; --no-edit reuses the original
            # commit message so `git rebase --continue` doesn't need an editor.
            if ! git pull --rebase origin master; then
              echo "Rebase failed, attempting automatic merge of state.json..."
              uv run python scripts/merge_state.py
              git add state.json
              git -c core.editor=true rebase --continue
            fi

            git push origin HEAD:master
          else
            echo "No changes to state.json, skipping commit"
          fi

      - name: Deploy to GitHub Pages
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          user_name: 'Discord Archive Bot'
          user_email: 'actions@github.com'
          commit_message: 'chore: deploy updated logs'
        id: deploy

      - name: Wait for GitHub Pages deployment
        if: steps.deploy.outcome == 'success'
        run: |
          echo "Waiting 60 seconds for GitHub Pages to deploy..."
          sleep 60

      - name: Install muffet
        if: steps.deploy.outcome == 'success'
        run: |
          set -euo pipefail
          wget https://github.com/raviqqe/muffet/releases/download/v2.11.1/muffet_linux_amd64.tar.gz
          tar -xzf muffet_linux_amd64.tar.gz
          chmod +x muffet
          ./muffet --version

      - name: Run muffet link check
        if: steps.deploy.outcome == 'success'
        id: muffet
        # Muffet may legitimately exit non-zero when it finds broken links —
        # that's information, not a workflow-stopping error. We capture its
        # report and parse counts, then surface them in the workflow summary.
        # The step itself fails only if muffet *crashes* or 404s exceed our
        # threshold; cosmetic broken links don't block the deploy.
        continue-on-error: false
        run: |
          set -uo pipefail
          echo "========================================="
          echo "Running muffet link check on https://discord.wafer.space..."
          echo "========================================="

          # We intentionally don't `set -e` here: muffet's non-zero exit on
          # broken links is expected and parsed below.
          set +e
          ./muffet \
            --verbose \
            --timeout=30 \
            --max-connections=10 \
            --max-connections-per-host=5 \
            --buffer-size=16384 \
            --exclude=".*mailto:.*" \
            --exclude=".*linkedin\.com.*" \
            --exclude=".*hawaii\.edu.*" \
            --exclude=".*github\.com.*" \
            --exclude=".*discord\.com.*" \
            --exclude=".*claude\.ai.*" \
            --exclude=".*google\.com.*" \
            --exclude=".*tinytapeout\.com.*" \
            --header="User-Agent:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            --header="Accept:text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7" \
            --header="Accept-Language:en-US,en;q=0.9" \
            --header="Accept-Encoding:gzip, deflate, br" \
            --header="Cache-Control:no-cache" \
            --header="Pragma:no-cache" \
            --header="Sec-Ch-Ua:\"Chromium\";v=\"122\", \"Not(A:Brand\";v=\"24\", \"Google Chrome\";v=\"122\"" \
            --header="Sec-Ch-Ua-Mobile:?0" \
            --header="Sec-Ch-Ua-Platform:\"Windows\"" \
            --header="Sec-Fetch-Dest:document" \
            --header="Sec-Fetch-Mode:navigate" \
            --header="Sec-Fetch-Site:none" \
            --header="Sec-Fetch-User:?1" \
            --header="Upgrade-Insecure-Requests:1" \
            https://discord.wafer.space 2>&1 | tee muffet-report.txt
          MUFFET_EXIT=${PIPESTATUS[0]}
          set -e

          echo ""
          echo "========================================="
          echo "Muffet completed with exit code: $MUFFET_EXIT"
          echo "========================================="

          # Count lines / 404s. `grep -c` outputs the count and then exits
          # non-zero when there are zero matches. The naive `|| echo 0` pattern
          # double-echoes "0" on no-match because grep already printed "0"
          # before exiting — that breaks the `key=value` format expected by
          # $GITHUB_OUTPUT. Capture into a variable and override on failure:
          count_lines() { wc -l < "$1" | tr -d ' '; }
          count_pattern() {
              local n
              n=$(grep -cE "$1" "$2") || n=0
              printf '%s' "$n"
          }
          count_pipe_pattern() {
              local n
              n=$(grep -E "$1" "$2" | grep -c "$3") || n=0
              printf '%s' "$n"
          }

          TOTAL_URLS=$(count_lines muffet-report.txt)
          TOTAL_404=$(count_pattern $'^\t404\t' muffet-report.txt)
          MEDIA_404=$(count_pipe_pattern $'^\t404\t' muffet-report.txt '_media/')

          echo "total_urls=$TOTAL_URLS" >> $GITHUB_OUTPUT
          echo "total_404=$TOTAL_404" >> $GITHUB_OUTPUT
          echo "media_404=$MEDIA_404" >> $GITHUB_OUTPUT
          echo "muffet_exit=$MUFFET_EXIT" >> $GITHUB_OUTPUT

          echo ""
          echo "Link Check Summary:"
          echo "- URLs checked: $TOTAL_URLS"
          echo "- Total 404 errors: $TOTAL_404"
          echo "- Media file 404s: $MEDIA_404"

      - name: Upload muffet report
        if: always() && steps.deploy.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: muffet-report
          path: muffet-report.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Surface export errors
        # CLAUDE.md policy: workflows should fail visibly when there are real
        # problems. The export script intentionally exits 0 on partial success
        # so downstream steps (organize/navigate/deploy) can run on whatever
        # data it produced — but a run with logged errors must still flag in
        # the workflow status so we don't drift into silently broken runs.
        if: always()
        run: |
          set -euo pipefail
          if [ ! -f export-summary.json ]; then
            echo "::warning::export-summary.json not produced — export may have failed before writing it"
            exit 0
          fi
          ERROR_COUNT=$(uv run python -c "import json; print(json.load(open('export-summary.json'))['error_count'])")
          echo "Export errors logged: $ERROR_COUNT"
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "::error::Export run logged $ERROR_COUNT errors. See the 'Run export script' step for details."
            exit 1
          fi

      - name: Report summary
        if: always()
        run: |
          set -euo pipefail
          echo "## Export Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Export Step**: ${{ steps.export.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Organize Step**: ${{ steps.organize.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Navigation Step**: ${{ steps.navigation.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Changes Detected**: ${{ steps.check_changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy Step**: ${{ steps.deploy.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f export-summary.json ]; then
            echo "### Export Counts" >> $GITHUB_STEP_SUMMARY
            uv run python -c "
          import json
          d = json.load(open('export-summary.json'))
          print(f'- Channels updated: {d[\"channels_updated\"]}')
          print(f'- Channels failed: {d[\"channels_failed\"]}')
          print(f'- Channels skipped (forbidden): {d.get(\"channels_skipped_forbidden\", 0)}')
          print(f'- Total exports: {d[\"total_exports\"]}')
          print(f'- Errors logged: {d[\"error_count\"]}')
          " >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Link Check Results" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.muffet.outcome }}" == "success" ]; then
            echo "- **Muffet Status**: Passed" >> $GITHUB_STEP_SUMMARY
            echo "- **URLs checked**: ${{ steps.muffet.outputs.total_urls }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Total 404 errors**: ${{ steps.muffet.outputs.total_404 }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Media file 404s**: ${{ steps.muffet.outputs.media_404 }}" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.muffet.outcome }}" == "failure" ]; then
            echo "- **Muffet Status**: Failed (exit ${{ steps.muffet.outputs.muffet_exit }})" >> $GITHUB_STEP_SUMMARY
            echo "- **URLs checked**: ${{ steps.muffet.outputs.total_urls }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Total 404 errors**: ${{ steps.muffet.outputs.total_404 }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Media file 404s**: ${{ steps.muffet.outputs.media_404 }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Link check was skipped (deploy did not run or no changes detected)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +%Y-%m-%d\ %H:%M\ UTC)" >> $GITHUB_STEP_SUMMARY
